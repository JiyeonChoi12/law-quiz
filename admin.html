<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — 법과목 기출문제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;
  --border:#ddd5c0;--border2:#c8bda8;
  --text:#2c2416;--text2:#6b5c45;--text3:#a89278;
  --accent:#7a5c2e;--accent2:#5a3f1a;
  --green:#2d7a4a;--green-bg:#e8f5ee;
  --red:#a63030;--red-bg:#faeaea;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;}
.wrap{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}
.app-header{text-align:center;padding:1.75rem 0 1.5rem;border-bottom:0.5px solid var(--border);margin-bottom:2rem;}
.app-header h1{font-size:18px;font-weight:500;color:var(--accent);}
.app-header p{font-size:12px;color:var(--text3);margin-top:4px;}
.screen{display:none;}.screen.active{display:block;}
#login-screen{max-width:340px;margin:4rem auto;text-align:center;}
#login-screen h2{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:1.5rem;}
.pw-row{display:flex;gap:8px;}
.tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;}
.tab{padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
input[type=text],input[type=password],textarea,select{width:100%;padding:9px 11px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:300;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent2);}
textarea{resize:none;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;display:block;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:0.5px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(0.98);}
.btn-accent{background:var(--accent);color:#fffdf8;border-color:var(--accent);font-weight:500;}
.btn-accent:hover{opacity:0.88;background:var(--accent);}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}
.btn-green{border-color:var(--green);color:var(--green);}
.btn-green:hover{background:var(--green-bg);}
.btn-sm{padding:5px 12px;font-size:12px;}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--rl);padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:1rem;}
.upload-zone:hover{border-color:var(--accent2);}
.upload-zone input{display:none;}
.processing{display:none;text-align:center;padding:2rem;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.api-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.5rem;}
.api-box h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;}
.api-box p{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6;}
.api-row{display:flex;gap:8px;}
.api-row input{flex:1;font-family:monospace;}
.api-status{font-size:12px;margin-top:6px;}
.api-status.ok{color:var(--green);}
.api-status.err{color:var(--red);}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;}
.badge-mc{background:#e8f0fa;color:#2d5a9e;border:0.5px solid #6a90c8;}
.badge-ox{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green);}
.badge-sa{background:#fdf3e4;color:#8a5520;border:0.5px solid #c47a30;}
.badge-topic{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);}
.badge-source{background:#f0eafa;color:#6b3fa0;border:0.5px solid #b08ad0;}
.stats-row{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
.mini-stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:8px 14px;font-size:13px;color:var(--text2);}
.mini-stat strong{color:var(--text);font-weight:500;}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
.toolbar select{width:auto;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:14px;}
.json-box{background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;font-family:monospace;font-size:12px;color:var(--text2);max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;margin-top:1rem;}

/* 문제 카드 (관리 탭) */
.q-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:8px;}
.q-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.q-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.q-card-text{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:8px;}
.q-card-footer{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tag-input-row{display:flex;gap:6px;align-items:center;margin-top:6px;}
.tag-input-row input{padding:5px 9px;font-size:12px;}
.tag-input-row select{width:auto;padding:5px 9px;font-size:12px;}

/* 태그 */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text2);}
.tag-del{cursor:pointer;color:var(--text3);font-size:10px;line-height:1;}
.tag-del:hover{color:var(--red);}

/* 일괄수정 */
.bulk-bar{background:var(--surface);border:0.5px solid var(--accent2);border-radius:var(--r);padding:12px 16px;margin-bottom:1rem;display:none;}
.bulk-bar.active{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.bulk-bar span{font-size:13px;color:var(--accent);font-weight:500;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <h1>관리자 페이지</h1>
    <p>문제 업로드 및 관리 · 주제·출처 태그 설정</p>
  </div>

  <!-- 로그인 -->
  <div id="login-screen" class="screen active">
    <h2>비밀번호를 입력하세요</h2>
    <div class="pw-row">
      <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
      <button class="btn btn-accent" onclick="checkPw()">입력</button>
    </div>
    <p id="pw-err" style="font-size:12px;color:var(--red);margin-top:8px;"></p>
    <p style="font-size:11px;color:var(--text3);margin-top:1.5rem;">비밀번호는 관리자만 알 수 있습니다</p>
  </div>

  <!-- 관리자 메인 -->
  <div id="admin-screen" class="screen">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('upload')">문제 추가</div>
      <div class="tab" onclick="switchTab('manage')">문제 관리</div>
      <div class="tab" onclick="switchTab('export')">JSON 내보내기</div>
    </div>

    <!-- 문제 추가 -->
    <div id="atab-upload">
      <div class="api-box">
        <h3>Google Gemini API 키 (이미지 자동 추출용)</h3>
        <p><a href="https://aistudio.google.com/keys" target="_blank" style="color:var(--accent);text-decoration:none;">aistudio.google.com</a>에서 발급</p>
        <div class="api-row">
          <input type="password" id="api-input" placeholder="AIza...">
          <button class="btn btn-accent" onclick="saveApiKey()">저장</button>
        </div>
        <div class="api-status" id="api-status"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
        <div class="form-group" style="margin:0;">
          <label class="form-label">과목</label>
          <select id="upload-subj">
            <option value="헌법">헌법</option>
            <option value="민법">민법</option>
            <option value="형법">형법</option>
            <option value="상법">상법</option>
            <option value="헌법논증이론">헌법 논증 이론</option>
            <option value="글쓰기">글쓰기</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">주제 태그</label>
          <input type="text" id="upload-topic" placeholder="예: 기본권">
        </div>
        <div class="form-group" style="margin:0;">
          <label class="form-label">출처</label>
          <select id="upload-source">
            <option value="">미지정</option>
            <option value="기출문제">기출문제</option>
            <option value="워크북">워크북</option>
            <option value="형성평가">형성평가</option>
          </select>
        </div>
      </div>

      <label class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)">
        <div style="font-size:24px;margin-bottom:8px;">📷</div>
        <div style="font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;">기출문제 이미지 업로드</div>
        <div style="font-size:12px;color:var(--text3);">클릭 또는 드래그 앤 드롭 · 위에서 주제·출처 먼저 선택</div>
      </label>
      <div class="processing" id="processing">
        <div class="spinner"></div>
        <p id="proc-msg" style="font-size:13px;color:var(--text2);"></p>
      </div>

      <div style="border-top:0.5px solid var(--border);padding-top:1.25rem;margin-top:0.5rem;">
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;">또는 직접 입력</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
          <div class="form-group" style="margin:0;">
            <label class="form-label">문제 유형</label>
            <select id="m-type" onchange="updateForm()">
              <option value="mc">객관식</option>
              <option value="ox">OX형</option>
              <option value="sa">단답형</option>
            </select>
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">주제 태그</label>
            <input type="text" id="m-topic" placeholder="예: 기본권">
          </div>
          <div class="form-group" style="margin:0;">
            <label class="form-label">출처</label>
            <select id="m-source">
              <option value="">미지정</option>
              <option value="기출문제">기출문제</option>
              <option value="워크북">워크북</option>
              <option value="형성평가">형성평가</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">문제</label>
          <textarea id="m-q" rows="3" placeholder="문제 내용"></textarea>
        </div>
        <div id="f-mc">
          <div class="form-group">
            <label class="form-label">보기</label>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <input type="text" class="m-choice" placeholder="① 보기 1">
              <input type="text" class="m-choice" placeholder="② 보기 2">
              <input type="text" class="m-choice" placeholder="③ 보기 3">
              <input type="text" class="m-choice" placeholder="④ 보기 4">
            </div>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <label class="form-label" style="margin:0;">정답</label>
            <select id="m-mc-ans" style="width:auto;"><option value="0">①</option><option value="1">②</option><option value="2">③</option><option value="3">④</option></select>
          </div>
        </div>
        <div id="f-ox" style="display:none;" class="form-group">
          <label class="form-label">정답</label>
          <select id="m-ox-ans" style="width:auto;"><option value="O">O</option><option value="X">X</option></select>
        </div>
        <div id="f-sa" style="display:none;" class="form-group">
          <label class="form-label">정답 키워드</label>
          <input type="text" id="m-sa-ans" placeholder="쉼표로 복수 가능">
        </div>
        <div class="form-group">
          <label class="form-label">해설 (선택)</label>
          <textarea id="m-exp" rows="2" placeholder="해설"></textarea>
        </div>
        <button class="btn btn-accent" onclick="saveManual()">저장</button>
      </div>
    </div>

    <!-- 문제 관리 -->
    <div id="atab-manage" style="display:none;">
      <div class="toolbar">
        <select id="filter-subj" onchange="renderManage()" style="width:auto;">
          <option value="all">전체 과목</option>
          <option value="헌법">헌법</option>
          <option value="민법">민법</option>
          <option value="형법">형법</option>
          <option value="상법">상법</option>
          <option value="헌법논증이론">헌법논증이론</option>
          <option value="글쓰기">글쓰기</option>
        </select>
        <select id="filter-source" onchange="renderManage()" style="width:auto;">
          <option value="all">전체 출처</option>
          <option value="">미지정</option>
          <option value="기출문제">기출문제</option>
          <option value="워크북">워크북</option>
          <option value="형성평가">형성평가</option>
        </select>
        <input type="text" id="filter-topic" placeholder="주제 검색" style="width:120px;padding:7px 10px;font-size:12px;" oninput="renderManage()">
        <button class="btn btn-danger btn-sm" onclick="clearSubject()">선택 과목 초기화</button>
      </div>

      <!-- 일괄 수정 바 -->
      <div class="bulk-bar" id="bulk-bar">
        <span id="bulk-cnt"></span>
        <select id="bulk-source" style="width:auto;font-size:12px;padding:5px 9px;">
          <option value="">출처 선택</option>
          <option value="기출문제">기출문제</option>
          <option value="워크북">워크북</option>
          <option value="형성평가">형성평가</option>
        </select>
        <input type="text" id="bulk-topic" placeholder="주제 태그 입력" style="width:140px;padding:5px 9px;font-size:12px;">
        <button class="btn btn-accent btn-sm" onclick="applyBulk()">선택 항목에 적용</button>
        <button class="btn btn-sm" onclick="clearSelection()">선택 해제</button>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="select-all" onchange="toggleSelectAll()"> 전체 선택
        </label>
        <span style="font-size:12px;color:var(--text3);" id="manage-total-cnt"></span>
      </div>

      <div class="stats-row" id="manage-stats"></div>
      <div id="manage-list"></div>
    </div>

    <!-- JSON 내보내기 -->
    <div id="atab-export" style="display:none;">
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.7;">
        JSON을 복사해서 GitHub <code style="color:var(--accent);">data/</code> 폴더에 덮어쓰세요.
      </p>
      <div class="form-group">
        <label class="form-label">과목</label>
        <select id="export-subj" onchange="renderExport()" style="width:auto;">
          <option value="헌법">헌법.json</option>
          <option value="민법">민법.json</option>
          <option value="형법">형법.json</option>
          <option value="상법">상법.json</option>
          <option value="헌법논증이론">헌법논증이론.json</option>
          <option value="글쓰기">글쓰기.json</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:0.5rem;">
        <button class="btn btn-accent" onclick="copyExport()">클립보드 복사</button>
        <button class="btn btn-green" onclick="downloadExport()">파일 다운로드</button>
      </div>
      <div class="json-box" id="json-preview"></div>
    </div>

    <div style="margin-top:2rem;text-align:right;">
      <button class="btn btn-danger" onclick="logout()">로그아웃</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PW = 'wldusqjqgkr1043*!';
const SUBJECT_KEYS = ['헌법','민법','형법','상법','헌법논증이론','글쓰기'];
const SUBJECT_FILES = {'헌법':'헌법.json','민법':'민법.json','형법':'형법.json','상법':'상법.json','헌법논증이론':'헌법논증이론.json','글쓰기':'글쓰기.json'};
const NUMS = ['①','②','③','④'];
let db = {}, API_KEY = '', selectedIds = new Set();

SUBJECT_KEYS.forEach(k=>db[k]=[]);
try{ const s=localStorage.getItem('admin_db'); if(s) db=JSON.parse(s); SUBJECT_KEYS.forEach(k=>{if(!db[k])db[k]=[];}); }catch(e){}
try{ API_KEY=localStorage.getItem('admin_api_key')||''; }catch(e){}

function save(){ try{localStorage.setItem('admin_db',JSON.stringify(db));}catch(e){} }

function checkPw(){
  if(document.getElementById('pw-input').value===ADMIN_PW){
    showScreen('admin-screen');
    if(API_KEY){ document.getElementById('api-input').value=API_KEY; showApiStatus('✓ API 키 저장됨',true); }
    renderManage(); renderExport();
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 틀렸어요';
    document.getElementById('pw-input').value='';
  }
}
function logout(){ showScreen('login-screen'); document.getElementById('pw-input').value=''; }

function saveApiKey(){
  const k=document.getElementById('api-input').value.trim();
  if(!k.startsWith('AIza')){ showApiStatus('올바른 키 형식이 아니에요 (AIza로 시작)',false); return; }
  API_KEY=k; try{localStorage.setItem('admin_api_key',k);}catch(e){} showApiStatus('✓ 저장됐어요',true);
}
function showApiStatus(msg,ok){ const el=document.getElementById('api-status'); el.textContent=msg; el.className='api-status '+(ok?'ok':'err'); }

function switchTab(tab){
  ['upload','manage','export'].forEach((t,i)=>{
    document.getElementById('atab-'+t).style.display=t===tab?'':'none';
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='manage') renderManage();
  if(tab==='export') renderExport();
}

function updateForm(){
  const t=document.getElementById('m-type').value;
  document.getElementById('f-mc').style.display=t==='mc'?'':'none';
  document.getElementById('f-ox').style.display=t==='ox'?'':'none';
  document.getElementById('f-sa').style.display=t==='sa'?'':'none';
}

function saveManual(){
  const subj=document.getElementById('filter-subj').value==='all'?'헌법':document.getElementById('upload-subj').value;
  const type=document.getElementById('m-type').value;
  const question=document.getElementById('m-q').value.trim();
  const explanation=document.getElementById('m-exp').value.trim();
  const topic=document.getElementById('m-topic').value.trim();
  const source=document.getElementById('m-source').value;
  if(!question){ alert('문제를 입력해주세요'); return; }
  const id=subj+'_'+Date.now();
  let q={id,type,question,explanation,topic,source};
  if(type==='mc'){
    const choices=Array.from(document.querySelectorAll('.m-choice')).map(e=>e.value.trim());
    if(choices.some(c=>!c)){ alert('모든 보기를 입력해주세요'); return; }
    q.choices=choices; q.answer=parseInt(document.getElementById('m-mc-ans').value);
  } else if(type==='ox'){
    q.answer=document.getElementById('m-ox-ans').value;
  } else {
    const ans=document.getElementById('m-sa-ans').value.trim();
    if(!ans){ alert('정답을 입력해주세요'); return; }
    q.answer=ans;
  }
  const uploadSubj=document.getElementById('upload-subj').value;
  db[uploadSubj].push(q); save();
  document.getElementById('m-q').value=''; document.getElementById('m-exp').value='';
  document.querySelectorAll('.m-choice').forEach(e=>e.value='');
  document.getElementById('m-topic').value='';
  if(document.getElementById('m-sa-ans')) document.getElementById('m-sa-ans').value='';
  alert(`[${uploadSubj}] 문제 추가됨! (${db[uploadSubj].length}개)`);
}

// FILE UPLOAD
async function handleFiles(files){
  if(!files.length) return;
  if(!API_KEY){ alert('API 키를 먼저 저장해주세요'); return; }
  const subj=document.getElementById('upload-subj').value;
  const topic=document.getElementById('upload-topic').value.trim();
  const source=document.getElementById('upload-source').value;
  const zone=document.getElementById('upload-zone');
  const proc=document.getElementById('processing');
  zone.style.display='none'; proc.style.display='block';
  let total=0;
  for(const file of files){
    document.getElementById('proc-msg').textContent=`"${file.name}" 분석 중...`;
    try{
      const b64=await toB64(file);
      const result=await extractQuestions(b64,file.type,subj);
      if(result&&result.length){
        result.forEach(q=>{ q.topic=topic; q.source=source; });
        db[subj].push(...result); total+=result.length;
      }
    }catch(e){ alert('오류: '+e.message); }
  }
  save(); zone.style.display=''; proc.style.display='none';
  document.getElementById('file-input').value='';
  if(total) alert(`[${subj}] ${total}개 추가됐어요!`);
  else alert('문제를 인식하지 못했어요');
}

function toB64(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);}); }

async function extractQuestions(b64,mediaType,subj){
  const prompt=`이 이미지는 "${subj}" 과목 시험 문제입니다. 모든 문제를 추출해 JSON 배열로만 반환하세요 (마크다운 없이):
객관식: {"id":"${subj}_001","type":"mc","question":"문제","choices":["① 보기1","② 보기2","③ 보기3","④ 보기4"],"answer":0,"explanation":"","topic":"","source":""}
OX형: {"id":"${subj}_001","type":"ox","question":"문제","answer":"O","explanation":"","topic":"","source":""}
단답형: {"id":"${subj}_001","type":"sa","question":"문제","answer":"키워드","explanation":"","topic":"","source":""}
JSON 배열만:`;
  const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inline_data:{mime_type:mediaType,data:b64}},
        {text:prompt}
      ]}],
      generationConfig:{temperature:0,maxOutputTokens:4000}
    })
  });
  if(!resp.ok){ const e=await resp.json(); throw new Error(e.error?.message||resp.status); }
  const data=await resp.json();
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

// MANAGE
function getFilteredRows(){
  const filterSubj=document.getElementById('filter-subj').value;
  const filterSource=document.getElementById('filter-source').value;
  const filterTopic=document.getElementById('filter-topic').value.trim().toLowerCase();
  const keys=filterSubj==='all'?SUBJECT_KEYS:[filterSubj];
  let rows=[];
  keys.forEach(k=>db[k].forEach((q,i)=>rows.push({subj:k,q,i})));
  if(filterSource!=='all') rows=rows.filter(r=>(r.q.source||'')===(filterSource));
  if(filterTopic) rows=rows.filter(r=>(r.q.topic||'').toLowerCase().includes(filterTopic));
  return rows;
}

function renderManage(){
  selectedIds.clear(); updateBulkBar();
  document.getElementById('select-all').checked=false;
  const statsEl=document.getElementById('manage-stats');
  statsEl.innerHTML=SUBJECT_KEYS.map(k=>`<div class="mini-stat"><strong>${db[k].length}</strong> ${k}</div>`).join('');
  const rows=getFilteredRows();
  document.getElementById('manage-total-cnt').textContent=`${rows.length}문제`;
  const listEl=document.getElementById('manage-list');
  if(!rows.length){ listEl.innerHTML='<div class="empty">문제가 없어요</div>'; return; }
  const typeBadge=t=>t==='mc'?'<span class="badge badge-mc">객관식</span>':t==='ox'?'<span class="badge badge-ox">OX</span>':'<span class="badge badge-sa">단답</span>';
  listEl.innerHTML=rows.map(({subj,q,i})=>{
    const uid=subj+'__'+i;
    const topicTag=q.topic?`<span class="badge badge-topic">${q.topic}</span>`:'';
    const sourceTag=q.source?`<span class="badge badge-source">${q.source}</span>`:'';
    return `<div class="q-card" id="card-${uid}">
      <div class="q-card-header">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;flex:1;">
          <input type="checkbox" style="margin-top:3px;width:auto;" onchange="toggleSelect('${uid}',this.checked)" ${selectedIds.has(uid)?'checked':''}>
          <div style="flex:1;">
            <div class="q-card-meta">${typeBadge(q.type)} <span style="font-size:11px;color:var(--text3);">${subj}</span> ${topicTag} ${sourceTag}</div>
            <div class="q-card-text" style="margin-top:6px;">${q.question.substring(0,100)}${q.question.length>100?'...':''}</div>
          </div>
        </label>
      </div>
      <div class="q-card-footer">
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1;">
          <input type="text" placeholder="주제 태그" value="${q.topic||''}" style="width:120px;padding:5px 9px;font-size:12px;" id="topic-${uid}">
          <select id="source-${uid}" style="width:auto;padding:5px 9px;font-size:12px;">
            <option value="" ${!q.source?'selected':''}>미지정</option>
            <option value="기출문제" ${q.source==='기출문제'?'selected':''}>기출문제</option>
            <option value="워크북" ${q.source==='워크북'?'selected':''}>워크북</option>
            <option value="형성평가" ${q.source==='형성평가'?'selected':''}>형성평가</option>
          </select>
          <button class="btn btn-sm" onclick="saveTag('${subj}',${i},'${uid}')">저장</button>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteQ('${subj}',${i})">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function saveTag(subj,idx,uid){
  const topic=document.getElementById('topic-'+uid).value.trim();
  const source=document.getElementById('source-'+uid).value;
  db[subj][idx].topic=topic;
  db[subj][idx].source=source;
  save(); renderManage();
}

function deleteQ(subj,idx){
  if(!confirm('이 문제를 삭제할까요?')) return;
  db[subj].splice(idx,1); save(); renderManage();
}

function clearSubject(){
  const filter=document.getElementById('filter-subj').value;
  if(filter==='all'){ alert('과목을 먼저 선택해주세요'); return; }
  if(!confirm(`[${filter}] 과목 전체 문제(${db[filter]?.length}개)를 삭제할까요?`)) return;
  db[filter]=[]; save(); renderManage();
}

// 선택 / 일괄수정
function toggleSelect(uid,checked){
  if(checked) selectedIds.add(uid); else selectedIds.delete(uid);
  updateBulkBar();
}
function toggleSelectAll(){
  const checked=document.getElementById('select-all').checked;
  const rows=getFilteredRows();
  rows.forEach(({subj,i})=>{ const uid=subj+'__'+i; if(checked)selectedIds.add(uid); else selectedIds.delete(uid); });
  updateBulkBar(); renderManage();
  document.getElementById('select-all').checked=checked;
}
function clearSelection(){ selectedIds.clear(); updateBulkBar(); renderManage(); }
function updateBulkBar(){
  const bar=document.getElementById('bulk-bar');
  if(selectedIds.size>0){ bar.classList.add('active'); document.getElementById('bulk-cnt').textContent=`${selectedIds.size}개 선택됨`; }
  else bar.classList.remove('active');
}
function applyBulk(){
  const source=document.getElementById('bulk-source').value;
  const topic=document.getElementById('bulk-topic').value.trim();
  if(!source&&!topic){ alert('출처 또는 주제를 입력해주세요'); return; }
  selectedIds.forEach(uid=>{
    const [subj,idxStr]=uid.split('__'); const idx=parseInt(idxStr);
    if(db[subj]&&db[subj][idx]){
      if(source) db[subj][idx].source=source;
      if(topic) db[subj][idx].topic=topic;
    }
  });
  save(); selectedIds.clear(); renderManage();
  alert('적용됐어요!');
}

// EXPORT
function renderExport(){
  const subj=document.getElementById('export-subj').value;
  document.getElementById('json-preview').textContent=JSON.stringify(db[subj]||[],null,2);
}
function copyExport(){
  const text=document.getElementById('json-preview').textContent;
  navigator.clipboard.writeText(text).then(()=>alert('복사됐어요!')).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); alert('복사됐어요!');
  });
}
function downloadExport(){
  const subj=document.getElementById('export-subj').value;
  const blob=new Blob([document.getElementById('json-preview').textContent],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=SUBJECT_FILES[subj]; a.click();
}

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

const uz=document.getElementById('upload-zone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.style.borderColor='var(--accent)';});
uz.addEventListener('dragleave',()=>{uz.style.borderColor='';});
uz.addEventListener('drop',e=>{e.preventDefault();uz.style.borderColor='';handleFiles(e.dataTransfer.files);});
</script>
