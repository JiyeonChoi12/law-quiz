<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>법학과 수강과목 기출문제</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;
  --border:#ddd5c0;--border2:#c8bda8;
  --text:#2c2416;--text2:#6b5c45;--text3:#a89278;
  --accent:#7a5c2e;--accent2:#5a3f1a;
  --green:#2d7a4a;--green-bg:#e8f5ee;
  --red:#a63030;--red-bg:#faeaea;
  --purple:#6b3fa0;--purple-bg:#f0eafa;
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;min-height:100vh;}
.wrap{max-width:640px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}
.app-header{text-align:center;padding:2rem 0 1.75rem;border-bottom:0.5px solid var(--border);margin-bottom:2rem;}
.app-header h1{font-family:'Noto Serif KR',serif;font-size:21px;font-weight:600;color:var(--accent);letter-spacing:0.06em;}
.app-header p{font-size:13px;color:var(--text3);margin-top:5px;}
.screen{display:none;}.screen.active{display:block;}

/* 홈 탭 */
.home-tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;}
.home-tab{padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color 0.15s;}
.home-tab:hover{color:var(--text);}
.home-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}

/* 과목 카드 */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.subject-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem 1rem;cursor:pointer;transition:all 0.2s;text-align:center;position:relative;overflow:hidden;}
.subject-card:hover{border-color:var(--accent2);background:#f5eddd;}
.subject-card:active{transform:scale(0.97);}
.subject-card.disabled{opacity:0.4;cursor:not-allowed;}
.subject-card .s-icon{font-size:22px;margin-bottom:8px;}
.subject-card .s-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.subject-card .s-count{font-size:11px;color:var(--text3);}
.subject-card .s-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);transition:width 0.4s;}

/* 모드 선택 */
.mode-header{margin-bottom:1.5rem;}
.mode-header .subj-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:600;color:var(--accent);margin-bottom:4px;}
.mode-header .subj-cnt{font-size:13px;color:var(--text3);}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
.mode-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem 1rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.mode-card:hover{border-color:var(--accent2);background:#f5eddd;}
.mode-card:active{transform:scale(0.97);}
.mode-card .m-icon{font-size:22px;margin-bottom:8px;}
.mode-card .m-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.mode-card .m-desc{font-size:11px;color:var(--text3);line-height:1.5;}
.mode-card.mode-exam{border-color:var(--accent2);}
.mode-card.mode-exam .m-name{color:var(--accent);}
.mode-card.mode-wn{border-color:var(--red);}
.mode-card.mode-wn .m-name{color:var(--red);}

/* 필터 박스 */
.filter-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem;}
.filter-box h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px;}
.filter-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;}
.filter-label{font-size:11px;color:var(--text3);min-width:36px;}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:12px;padding:4px 12px;border:0.5px solid var(--border2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.chip:hover{border-color:var(--accent2);color:var(--accent);}
.chip.active{background:var(--accent);color:#fffdf8;border-color:var(--accent);}
.chip.source-chip.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.filter-result{font-size:12px;color:var(--text3);margin-top:8px;}

/* 시간 선택 */
.time-select{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.time-select h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px;}
.time-btns{display:flex;gap:10px;}
.time-btn{flex:1;padding:14px;border:0.5px solid var(--border2);border-radius:var(--r);background:transparent;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.time-btn:hover{background:var(--surface2);border-color:var(--accent2);}
.time-btn .t-min{font-size:22px;font-weight:500;color:var(--accent);}

/* 타이머 */
.timer-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:10px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);}
.timer-display{font-size:20px;font-weight:500;color:var(--accent);font-family:monospace;letter-spacing:0.05em;}
.timer-display.urgent{color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.timer-label{font-size:11px;color:var(--text3);margin-bottom:2px;}

/* 진행바 */
.progress-wrap{margin-bottom:1.25rem;}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:8px;}
.progress-meta span{font-size:12px;color:var(--text3);}
.progress-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s cubic-bezier(.4,0,.2,1);}

/* 배지 */
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-mc{background:#e8f0fa;color:#2d5a9e;border:0.5px solid #6a90c8;}
.badge-ox{background:var(--green-bg);color:var(--green);border:0.5px solid var(--green);}
.badge-sa{background:#fdf3e4;color:#8a5520;border:0.5px solid #c47a30;}
.badge-subj{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);}
.badge-topic{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);}
.badge-source{background:var(--purple-bg);color:var(--purple);border:0.5px solid var(--purple);}
.badge-exam{background:#fdf3e4;color:var(--accent);border:0.5px solid var(--accent2);}

/* 문제 */
.q-label{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.q-body{font-family:'Noto Serif KR',serif;font-size:16px;line-height:1.8;color:var(--text);margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border);}

/* 보기 */
.choices{display:flex;flex-direction:column;gap:8px;}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:0.5px solid var(--border);border-radius:var(--r);background:transparent;cursor:pointer;text-align:left;width:100%;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.choice-btn:hover:not(.disabled){border-color:var(--border2);background:var(--surface2);}
.choice-num{font-size:12px;font-weight:500;color:var(--text3);min-width:18px;padding-top:1px;}
.choice-text{font-size:14px;color:var(--text);line-height:1.55;font-weight:300;}
.choice-btn.correct{border-color:var(--green);background:var(--green-bg);}
.choice-btn.correct .choice-num,.choice-btn.correct .choice-text{color:var(--green);}
.choice-btn.wrong{border-color:var(--red);background:var(--red-bg);}
.choice-btn.wrong .choice-num,.choice-btn.wrong .choice-text{color:var(--red);}
.choice-btn.selected{border-color:var(--accent);background:#f5eddd;}
.choice-btn.selected .choice-num{color:var(--accent);}
.choice-btn.disabled{cursor:default;}
.ox-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ox-btn{padding:20px;border:0.5px solid var(--border);border-radius:var(--rl);font-size:28px;cursor:pointer;background:transparent;transition:all 0.15s;text-align:center;}
.ox-btn:hover:not(.disabled){background:var(--surface2);border-color:var(--border2);}
.ox-btn.correct{border-color:var(--green);background:var(--green-bg);}
.ox-btn.wrong{border-color:var(--red);background:var(--red-bg);}
.ox-btn.selected{border-color:var(--accent);background:#f5eddd;}
.ox-btn.disabled{cursor:default;}
.sa-row{display:flex;gap:8px;}
.sa-input{flex:1;padding:11px 13px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;}
.sa-input:focus{border-color:var(--accent2);}
.sa-input:disabled{opacity:0.5;}

/* 피드백 */
.feedback-box{margin-top:14px;padding:14px 16px;border-radius:var(--r);font-size:13px;line-height:1.65;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.feedback-box.correct{border:0.5px solid var(--green);background:var(--green-bg);}
.feedback-box.wrong{border:0.5px solid var(--red);background:var(--red-bg);}
.fb-title{font-weight:500;margin-bottom:5px;}
.feedback-box.correct .fb-title{color:var(--green);}
.feedback-box.wrong .fb-title{color:var(--red);}
.fb-answer{font-size:13px;color:var(--text2);margin-bottom:5px;}
.fb-exp{font-size:13px;color:var(--text2);border-top:0.5px solid var(--border);padding-top:10px;margin-top:10px;}
.fb-exp-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}

/* 실전모드 네비 */
.q-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;}
.q-dot{width:30px;height:30px;border-radius:50%;font-size:11px;font-weight:500;border:0.5px solid var(--border2);background:var(--surface);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.q-dot:hover{border-color:var(--accent);color:var(--accent);}
.q-dot.answered{background:var(--accent);color:#fffdf8;border-color:var(--accent);}
.q-dot.current{border:2px solid var(--accent2);color:var(--accent);}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:0.5px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s;font-weight:400;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(0.98);}
.btn-accent{background:var(--accent);color:#fffdf8;border-color:var(--accent);font-weight:500;}
.btn-accent:hover{opacity:0.88;background:var(--accent);}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-bg);}
.btn-full{width:100%;justify-content:center;padding:12px;font-size:14px;}

/* 결과 */
.result-hero{text-align:center;padding:2rem 0 1.5rem;}
.result-ring{width:110px;height:110px;border-radius:50%;border:2px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1rem;}
.result-ring .big{font-size:28px;font-weight:500;color:var(--accent);}
.result-ring .small{font-size:12px;color:var(--text3);}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;}
.stat-card .lbl{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
.stat-card .val{font-size:20px;font-weight:500;}
.review-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.review-section h3{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:1rem;}
.review-item{padding:12px 0;border-bottom:0.5px solid var(--border);}
.review-item:last-child{border-bottom:none;}
.r-q{font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.55;}
.r-my{font-size:12px;color:var(--red);margin-bottom:2px;}
.r-ans{font-size:12px;color:var(--green);}
.r-exp{font-size:12px;color:var(--text2);margin-top:7px;padding:8px 10px;background:var(--surface2);border-radius:var(--r);line-height:1.6;}

/* 오답노트 */
.wn-subj-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wn-subj-card:hover{border-color:var(--accent2);background:#f5eddd;}
.wn-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.8;}
.wn-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:8px;}
.wn-wrong-cnt{font-size:11px;color:var(--red);background:var(--red-bg);border:0.5px solid var(--red);border-radius:20px;padding:2px 8px;}
.wn-q{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:8px;font-family:'Noto Serif KR',serif;}
.wn-ans{font-size:12px;color:var(--green);margin-bottom:4px;}
.wn-exp{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--surface2);border-radius:var(--r);line-height:1.6;margin-top:6px;}
.wn-del{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 8px;border:0.5px solid var(--border2);border-radius:var(--r);}
.wn-del:hover{color:var(--red);border-color:var(--red);background:var(--red-bg);}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
.divider{height:0.5px;background:var(--border);margin:1.5rem 0;}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);cursor:pointer;margin-bottom:1.5rem;}
.back-btn:hover{color:var(--text2);}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;} ::-webkit-scrollbar-track{background:var(--surface2);}
.settings-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.settings-card-left{flex:1;}
.settings-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;}
.settings-desc{font-size:12px;color:var(--text3);}
.unlock-modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:999;}
.unlock-modal{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:2rem 1.5rem;width:300px;text-align:center;}
.unlock-modal h3{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}
.unlock-modal p{font-size:12px;color:var(--text3);margin-bottom:16px;}
.unlock-modal input{margin-bottom:10px;text-align:center;letter-spacing:0.1em;}
.unlock-err{font-size:12px;color:var(--red);margin-bottom:8px;min-height:16px;}
/* 통계 */
.stats-section{margin-bottom:1.75rem;}
.stats-section-title{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.stat-row{margin-bottom:10px;}
.stat-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.stat-row-label{font-size:13px;color:var(--text);}
.stat-row-val{font-size:12px;color:var(--text2);}
.stat-bar-wrap{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}
.stat-bar-fill.good{background:var(--green);}
.stat-bar-fill.mid{background:#c9a030;}
.stat-bar-fill.bad{background:var(--red);}
.overview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.75rem;}
.ov-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center;}
.ov-card .ov-val{font-size:22px;font-weight:500;color:var(--accent);margin-bottom:4px;}
.ov-card .ov-label{font-size:11px;color:var(--text3);}
.stats-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;line-height:1.8;}

</style>
</head>
<body>
<div class="wrap">
  <div class="app-header">
    <h1 onclick="location.reload()" style="cursor:pointer;">법학과 수강과목 기출문제</h1>
    <p>과목을 선택하고 학습하세요</p>
    <a href="https://www.law.go.kr/LSW/main.html" target="_blank"
      style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:7px 16px;background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;border-radius:20px;text-decoration:none;font-family:inherit;border:0.5px solid var(--border2);transition:opacity 0.15s;"
      onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='1'">
      ⚖️ 법령정보센터 바로가기
    </a>
    <a href="https://open.kakao.com/o/sg1nQ5oi" target="_blank"
      style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:7px 16px;background:#FEE500;color:#3A1D1D;font-size:12px;font-weight:500;border-radius:20px;text-decoration:none;font-family:inherit;transition:opacity 0.15s;"
      onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">
      💬 개발자에게 메시지 남기기
    </a>
    <p style="margin-top:10px;font-size:12px;color:var(--red);font-weight:500;">© 무단 배포 및 공유 금지</p>
  </div>

  <!-- 홈 -->
  <div id="screen-home" class="screen active">
    <div class="home-tabs">
      <div class="home-tab active" onclick="switchHomeTab('quiz')">과목 선택</div>
      <div class="home-tab" onclick="switchHomeTab('wrongnote')">오답노트</div>
      <div class="home-tab" onclick="switchHomeTab('stats')">취약점 분석</div>
      <div class="home-tab" onclick="switchHomeTab('settings')">설정</div>
    </div>
    <div id="tab-quiz"><div class="subject-grid" id="subject-grid"></div></div>
    <div id="tab-wrongnote" style="display:none;"><div id="wn-subj-list"></div></div>
    <div id="tab-stats" style="display:none;"><div id="stats-content"></div></div>
    <div id="tab-settings" style="display:none;"><div id="settings-content"></div></div>
  </div>

  <!-- 모드 선택 -->
  <div id="screen-mode" class="screen">
    <div class="back-btn" onclick="backToHome()">← 과목 선택</div>
    <div class="mode-header">
      <div class="subj-name" id="mode-subj-name"></div>
      <div class="subj-cnt" id="mode-subj-cnt"></div>
    </div>

    <!-- 필터 -->
    <div class="filter-box">
      <h3>범위 설정 <span style="font-size:11px;font-weight:300;color:var(--text3);">(선택 안 하면 전체)</span></h3>
      <div class="filter-row">
        <span class="filter-label">주제</span>
        <div class="filter-chips" id="topic-chips"></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">출처</span>
        <div class="filter-chips" id="source-chips">
          <button class="chip source-chip active" data-val="all" onclick="toggleSource(this)">전체</button>
          <button class="chip source-chip" data-val="기출문제" onclick="toggleSource(this)">기출문제</button>
          <button class="chip source-chip" data-val="워크북" onclick="toggleSource(this)">워크북</button>
          <button class="chip source-chip" data-val="형성평가" onclick="toggleSource(this)">형성평가</button>
          <button class="chip source-chip" data-val="강의문제" onclick="toggleSource(this)">강의문제</button>
          <button class="chip source-chip" data-val="자격증시험" onclick="toggleSource(this)">자격증 시험</button>

<script>
const DATA_BASE='./data/';
const SUBJECTS=[
  {key:'헌법',icon:'⚖️',file:'헌법.json'},
  {key:'민법',icon:'📜',file:'민법.json'},
  {key:'형법',icon:'🔍',file:'형법.json'},
  {key:'상법',icon:'🏛️',file:'상법.json'},
  {key:'헌법 논증 이론',icon:'📝',file:'헌법논증이론.json'},
  {key:'글쓰기',icon:'✍️',file:'글쓰기.json'},
];
const NUMS=['①','②','③','④','⑤'];
let quiz=[],cur=0,correct=0,answered=false,wrongList=[];
let currentSubject=null,currentMode='normal',allData={};
let examAnswers={},examCur=0,timerSec=0,timerInterval=null;
let wnCurrentSubj=null;
let selectedTopics=new Set(),selectedSource='all'; // 필터 상태

// ── 오답노트 ──
function getWN(k){try{return JSON.parse(localStorage.getItem('lq_wn_'+k)||'{}');}catch(e){return{};}}
function saveWN(k,d){try{localStorage.setItem('lq_wn_'+k,JSON.stringify(d));}catch(e){}}
function addWN(k,q,myAns){
  const wn=getWN(k); const key=q.id||q.question.substring(0,30);
  if(!wn[key])wn[key]={q,wrongCount:0,lastMyAns:''};
  wn[key].wrongCount++; wn[key].lastMyAns=myAns; wn[key].q=q;
  saveWN(k,wn);
}
function getStats(k){try{return JSON.parse(localStorage.getItem('lq_s_'+k)||'{"a":0,"s":null}');}catch(e){return{a:0,s:null};}}
function saveStats(k,score){const s=getStats(k);s.a++;s.s=score;try{localStorage.setItem('lq_s_'+k,JSON.stringify(s));}catch(e){}}

async function loadSubject(subj){
  if(allData[subj.key])return allData[subj.key];
  const r=await fetch(DATA_BASE+subj.file+'?t='+Date.now());
  if(!r.ok)throw new Error('파일 없음');
  const d=await r.json(); allData[subj.key]=d; return d;
}

// ── 홈 ──
function switchHomeTab(tab){
  document.querySelectorAll('.home-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='quiz')||(i===1&&tab==='wrongnote')||(i===2&&tab==='stats')||(i===3&&tab==='settings')));
  document.getElementById('tab-quiz').style.display=tab==='quiz'?'':'none';
  document.getElementById('tab-wrongnote').style.display=tab==='wrongnote'?'':'none';
  document.getElementById('tab-stats').style.display=tab==='stats'?'':'none';
  document.getElementById('tab-settings').style.display=tab==='settings'?'':'none';
  if(tab==='wrongnote')renderWNHome();
  if(tab==='stats')renderStats();
  if(tab==='settings')renderSettings();
}

async function renderHome(){
  const grid=document.getElementById('subject-grid');
  grid.innerHTML=SUBJECTS.map((s,i)=>`<div class="subject-card" id="sc-${i}" onclick="selectSubject(${i})">
    <div class="s-icon">${s.icon}</div><div class="s-name">${s.key}</div>
    <div class="s-count" id="sc-cnt-${i}">로딩 중...</div>
    <div class="s-bar" id="sc-bar-${i}" style="width:0%"></div>
  </div>`).join('');
  SUBJECTS.forEach(async(s,i)=>{
    try{
      const d=await loadSubject(s); const cnt=d.length;
      const st=getStats(s.key);
      document.getElementById('sc-cnt-'+i).textContent=cnt>0?`${cnt}문제${st.s!==null?' · 최근 '+st.s+'점':''}`:'문제 없음';
      if(cnt===0)document.getElementById('sc-'+i).classList.add('disabled');
      if(st.s!==null)document.getElementById('sc-bar-'+i).style.width=st.s+'%';
    }catch(e){document.getElementById('sc-cnt-'+i).textContent='오류';document.getElementById('sc-'+i).classList.add('disabled');}
  });
}

// ── 과목 선택 & 필터 ──
async function selectSubject(idx){
  if(document.getElementById('sc-'+idx).classList.contains('disabled'))return;
  const subj=SUBJECTS[idx];
  try{
    const d=await loadSubject(subj);
    if(!d.length){alert('문제가 없어요');return;}
    currentSubject=subj;
    selectedTopics.clear(); selectedSource='all';
    document.getElementById('mode-subj-name').textContent=subj.key;
    

    // 주제 칩 생성
    const topics=[...new Set(d.map(q=>q.topic).filter(Boolean))].sort();
    const topicEl=document.getElementById('topic-chips');
    if(topics.length){
      topicEl.innerHTML='<button class="chip active" data-val="all" onclick="toggleTopic(this)">전체</button>'
        +topics.map(t=>`<button class="chip" data-val="${t}" onclick="toggleTopic(this)">${t}</button>`).join('');
    } else {
      topicEl.innerHTML='<span style="font-size:12px;color:var(--text3);">주제 태그 없음</span>';
    }

    // 출처 칩 초기화
    document.querySelectorAll('.source-chip').forEach(c=>c.classList.toggle('active',c.dataset.val==='all'));
    // 강의문제 칩 (잠금해제된 경우만)
    const existingLec=document.querySelector('#source-chips .chip[data-val="강의문제"]');
    if(!existingLec && lectureUnlocked){
      const btn=document.createElement('button');
      btn.className='chip source-chip';
      btn.dataset.val='강의문제';
      btn.textContent='강의문제 🔓';
      btn.onclick=function(){toggleSource(this);};
      document.getElementById('source-chips').appendChild(btn);
    } else if(!lectureUnlocked){
      const lockBtn=document.createElement('button');
      lockBtn.className='chip';
      lockBtn.textContent='강의문제 🔒';
      lockBtn.onclick=showUnlockModal;
      lockBtn.style.borderStyle='dashed';
      document.getElementById('source-chips').appendChild(lockBtn);
    }

    updateFilterResult(d);

    // 오답풀기 카드
    const wn=getWN(subj.key);
    const wnCnt=Object.keys(wn).length;
    const wnCard=document.getElementById('mode-wn-card');
    if(wnCnt>0){wnCard.style.display='';document.getElementById('mode-wn-desc').textContent=`${wnCnt}문제 틀린 것만`;}
    else wnCard.style.display='none';

    showScreen('screen-mode');
  }catch(e){alert('로드 실패: '+e.message);}
}

function toggleTopic(btn){
  const val=btn.dataset.val;
  if(val==='all'){
    selectedTopics.clear();
    document.querySelectorAll('#topic-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.val==='all'));
  } else {
    document.querySelector('#topic-chips .chip[data-val="all"]').classList.remove('active');
    btn.classList.toggle('active');
    if(btn.classList.contains('active')) selectedTopics.add(val); else selectedTopics.delete(val);
    if(selectedTopics.size===0) document.querySelector('#topic-chips .chip[data-val="all"]').classList.add('active');
  }
  updateFilterResult(allData[currentSubject.key]||[]);
}

function toggleSource(btn){
  const val=btn.dataset.val;
  selectedSource=val;
  document.querySelectorAll('.source-chip').forEach(c=>c.classList.toggle('active',c.dataset.val===val));
  updateFilterResult(allData[currentSubject.key]||[]);
}

function getFilteredData(data){
  return data.filter(q=>{
    const topicOk=selectedTopics.size===0||selectedTopics.has(q.topic||'');
    const sourceOk=selectedSource==='all'||(q.source||'')===selectedSource;
    return topicOk&&sourceOk;
  });
}

function updateFilterResult(data){
  const filtered=getFilteredData(data);
  const cnt=Math.min(25,filtered.length);
  document.getElementById('mode-subj-cnt').textContent=`${filtered.length}문제 중 ${cnt}문제 출제`;
  document.getElementById('filter-result').textContent=filtered.length===0?'해당 조건의 문제가 없어요':'';
}

// ── 모드 시작 ──
function getQuizPool(){
  const data=allData[currentSubject.key]||[];
  return getFilteredData(data);
}

function showTimeSelect(){}

function startNormalMode(){
  const pool=getQuizPool();
  if(!pool.length){alert('선택한 조건의 문제가 없어요');return;}
  currentMode='normal';
  quiz=shuffle([...pool]);
  cur=0;correct=0;wrongList=[];
  showScreen('screen-quiz');renderQ();
}

function startExamMode(min){
  const pool=getQuizPool();
  if(!pool.length){alert('선택한 조건의 문제가 없어요');return;}
  currentMode='exam';
  quiz=shuffle([...pool]).slice(0,Math.min(25,pool.length));
  examAnswers={};examCur=0;timerSec=min*60;
  showScreen('screen-exam');renderExamQ(0);startTimer();
}

function startWrongNoteQuiz(){
  currentMode='wrongnote';
  const wn=getWN(currentSubject.key);
  quiz=shuffle(Object.values(wn).map(i=>i.q)).slice(0,Math.min(25,Object.values(wn).length));
  cur=0;correct=0;wrongList=[];
  showScreen('screen-quiz');renderQ();
}

// ── 일반 모드 ──
function renderQ(){
  answered=false;
  const q=quiz[cur];
  document.getElementById('prog-fill').style.width=Math.round((cur/quiz.length)*100)+'%';
  document.getElementById('q-meta-l').textContent=`${cur+1} / ${quiz.length}`;
  document.getElementById('q-meta-r').textContent=`정답 ${correct}개`;
  let labelHtml=typeBadge(q.type)+` <span class="badge badge-subj">${currentSubject.key}</span>`;
  if(q.topic) labelHtml+=` <span class="badge badge-topic">${q.topic}</span>`;
  if(q.source) labelHtml+=` <span class="badge badge-source">${q.source}</span>`;
  document.getElementById('q-label').innerHTML=labelHtml;
  document.getElementById('q-body').textContent=q.question;
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('score-live').textContent='';
  renderAnswerArea('answer-area',q,'normal',cur);
}

function showFeedback(ok,q){
  const fb=document.getElementById('feedback');
  fb.className='feedback-box '+(ok?'correct':'wrong');
  let ans='';
  if(!ok){ans=q.type==='mc'?`정답: ${NUMS[q.answer]} ${q.choices[q.answer]}`:`정답: ${q.answer}`;}
  const exp=q.explanation?`<div class="fb-exp"><div class="fb-exp-label">해설</div>${q.explanation}</div>`:'';
  fb.innerHTML=`<div class="fb-title">${ok?'✓ 정답':'✗ 오답'}</div>`+(ans?`<div class="fb-answer">${ans}</div>`:'')+exp;
  fb.style.display='block';
  const nb=document.getElementById('next-btn');
  nb.style.display='inline-flex';
  nb.textContent=cur+1<quiz.length?'다음 →':'결과 보기 →';
}

function checkMCAnswer(selected, answer){
  if(Array.isArray(answer)){
    return Array.isArray(selected)
      ? answer.length===selected.length && answer.every(a=>selected.includes(a))
      : answer.length===1 && answer[0]===selected;
  }
  return selected===answer;
}
function isCorrectChoice(i, answer){
  return Array.isArray(answer)?answer.includes(i):i===answer;
}

function normalSelectMC(idx){
  if(answered)return;
  const q=quiz[cur];
  if(Array.isArray(q.answer)){
    // 복수정답: 토글 방식으로 선택
    const btn=document.querySelectorAll('#answer-area .choice-btn')[idx];
    btn.classList.toggle('selected');
    // 확인 버튼 표시
    if(!document.getElementById('mc-confirm-btn')){
      const nb=document.createElement('button');
      nb.id='mc-confirm-btn'; nb.className='btn btn-accent';
      nb.style.cssText='margin-top:12px;';
      nb.textContent='선택 완료';
      nb.onclick=confirmMultiMC;
      document.getElementById('answer-area').appendChild(nb);
    }
    return;
  }
  // 단일정답
  answered=true;
  const ok=idx===q.answer;
  if(ok)correct++; else{wrongList.push({q,myAns:NUMS[idx]+' '+q.choices[idx]});addWN(currentSubject.key,q,NUMS[idx]+' '+q.choices[idx]);}
  document.querySelectorAll('#answer-area .choice-btn').forEach((b,i)=>{
    b.classList.add('disabled');
    if(isCorrectChoice(i,q.answer))b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
  });
  showFeedback(ok,q);
}

function confirmMultiMC(){
  if(answered)return; answered=true;
  const q=quiz[cur];
  const selected=Array.from(document.querySelectorAll('#answer-area .choice-btn.selected')).map(b=>parseInt(b.dataset.idx));
  const ok=checkMCAnswer(selected,q.answer);
  const myAnsStr=selected.map(i=>NUMS[i]+' '+q.choices[i]).join(', ');
  if(ok)correct++; else{wrongList.push({q,myAns:myAnsStr});addWN(currentSubject.key,q,myAnsStr);}
  document.querySelectorAll('#answer-area .choice-btn').forEach((b,i)=>{
    b.classList.add('disabled'); b.classList.remove('selected');
    if(isCorrectChoice(i,q.answer))b.classList.add('correct');
    else if(selected.includes(i)&&!isCorrectChoice(i,q.answer))b.classList.add('wrong');
  });
  const cb=document.getElementById('mc-confirm-btn');
  if(cb)cb.remove();
  showFeedback(ok,q);
}

function normalSelectOX(val){
  if(answered)return; answered=true;
  const q=quiz[cur]; const ok=val===q.answer;
  if(ok)correct++; else{wrongList.push({q,myAns:val});addWN(currentSubject.key,q,val);}
  document.querySelectorAll('#answer-area .ox-btn').forEach(b=>{
    b.classList.add('disabled');
    if(b.dataset.val===q.answer)b.classList.add('correct');
    else if(b.dataset.val===val&&!ok)b.classList.add('wrong');
  });
  showFeedback(ok,q);
}

function normalCheckSA(){
  if(answered)return;
  const inp=document.querySelector('#answer-area .sa-input');
  const val=inp.value.trim();
  if(!val){alert('정답을 입력해주세요');return;}
  answered=true;
  const q=quiz[cur];
  const kws=(q.answer||'').split(',').map(k=>k.trim()).filter(Boolean);
  const ok=kws.length>0&&kws.some(k=>val.includes(k));
  if(ok)correct++; else{wrongList.push({q,myAns:val});addWN(currentSubject.key,q,val);}
  inp.disabled=true; showFeedback(ok,q);
}

function nextQ(){cur++;if(cur<quiz.length)renderQ();else showResult('normal');}

// ── 실전 모드 ──
function startTimer(){
  clearInterval(timerInterval);updateTimer();
  timerInterval=setInterval(()=>{timerSec--;updateTimer();if(timerSec<=0){clearInterval(timerInterval);submitExam(true);}},1000);
}
function updateTimer(){
  const m=Math.floor(timerSec/60),s=timerSec%60;
  const el=document.getElementById('timer-disp');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer-display'+(timerSec<=60?' urgent':'');
}

function renderExamQ(idx){
  examCur=idx;
  const q=quiz[idx];
  document.getElementById('eprog-fill').style.width=Math.round((idx/quiz.length)*100)+'%';
  document.getElementById('eq-meta-l').textContent=`${idx+1} / ${quiz.length}`;
  let labelHtml=typeBadge(q.type)+` <span class="badge badge-subj">${currentSubject.key}</span> <span class="badge badge-exam">실전</span>`;
  if(q.topic) labelHtml+=` <span class="badge badge-topic">${q.topic}</span>`;
  if(q.source) labelHtml+=` <span class="badge badge-source">${q.source}</span>`;
  document.getElementById('eq-label').innerHTML=labelHtml;
  document.getElementById('eq-body').textContent=q.question;
  document.getElementById('ans-count').textContent=`${Object.keys(examAnswers).length} / ${quiz.length}`;
  renderNav(); renderAnswerArea('eanswer-area',q,'exam',idx);
}

function renderNav(){
  document.getElementById('q-nav').innerHTML=quiz.map((_,i)=>
    `<div class="q-dot${examAnswers[i]!==undefined?' answered':''}${i===examCur?' current':''}" onclick="examGo(${i})">${i+1}</div>`
  ).join('');
}

function examGo(idx){
  if(idx<0||idx>=quiz.length)return;
  const inp=document.querySelector('#eanswer-area .sa-input');
  if(inp&&inp.value.trim())examAnswers[examCur]=inp.value.trim();
  renderExamQ(idx);
}

function examSelectMC(qIdx,ci){
  const q=quiz[qIdx];
  if(Array.isArray(q.answer)){
    // 복수정답: 토글
    let cur=examAnswers[qIdx];
    if(!Array.isArray(cur))cur=[];
    const idx=cur.indexOf(ci);
    if(idx>=0)cur.splice(idx,1); else cur.push(ci);
    examAnswers[qIdx]=cur.length?cur:undefined;
    if(!cur.length)delete examAnswers[qIdx];
    document.querySelectorAll('#eanswer-area .choice-btn').forEach((b,i)=>b.classList.toggle('selected',cur.includes(i)));
  } else {
    examAnswers[qIdx]=ci;
    document.querySelectorAll('#eanswer-area .choice-btn').forEach((b,i)=>b.classList.toggle('selected',i===ci));
  }
  document.getElementById('ans-count').textContent=`${Object.keys(examAnswers).length} / ${quiz.length}`;
  renderNav();
}

function examSelectOX(qIdx,val){
  examAnswers[qIdx]=val;
  document.querySelectorAll('#eanswer-area .ox-btn').forEach(b=>b.classList.toggle('selected',b.dataset.val===val));
  document.getElementById('ans-count').textContent=`${Object.keys(examAnswers).length} / ${quiz.length}`;
  renderNav();
}

function submitExam(timeUp=false){
  const inp=document.querySelector('#eanswer-area .sa-input');
  if(inp&&inp.value.trim())examAnswers[examCur]=inp.value.trim();
  if(!timeUp&&Object.keys(examAnswers).length<quiz.length){
    if(!confirm(`미답 ${quiz.length-Object.keys(examAnswers).length}문제가 있어요. 제출할까요?`))return;
  }
  clearInterval(timerInterval); showResult('exam');
}

    area.innerHTML='<div class="choices">'+q.choices.map((c,i)=>
      `<button class="choice-btn${savedArr.includes(i)?' selected':''}" data-idx="${i}"
        onclick="${mode==='exam'?`examSelectMC(${qIdx},${i})`:`normalSelectMC(${i})`}">

      <button class="ox-btn${mode==='exam'&&saved==='X'?' selected':''}" data-val="X" onclick="${mode==='exam'?`examSelectOX(${qIdx},'X')`:`normalSelectOX('X')`}">✕</button>

      ${mode==='normal'?'<button class="btn btn-accent" onclick="normalCheckSA()">확인</button>':''}

// ── 결과 ──
function showResult(mode){
  let correctCnt=0,wrongItems=[],skipCnt=0;
  if(mode==='normal'||mode==='wrongnote'){
    correctCnt=correct; wrongItems=wrongList;
  }else{
    quiz.forEach((q,i)=>{
      const ans=examAnswers[i];
      if(ans===undefined){skipCnt++;wrongItems.push({q,myAns:'미답',skip:true});return;}
      let ok=false;
      if(q.type==='mc')ok=checkMCAnswer(Array.isArray(ans)?ans:ans,q.answer);
      else if(q.type==='ox')ok=ans===q.answer;
      else{const kws=(q.answer||'').split(',').map(k=>k.trim()).filter(Boolean);ok=kws.length>0&&kws.some(k=>ans.includes(k));}
      if(ok)correctCnt++;
      else{wrongItems.push({q,myAns:q.type==='mc'?NUMS[ans]+' '+q.choices[ans]:ans});addWN(currentSubject.key,q,q.type==='mc'?NUMS[ans]+' '+q.choices[ans]:ans);}
    });
  }
  const score=Math.round((correctCnt/quiz.length)*100);
  saveStats(currentSubject.key,score);
  document.getElementById('res-score').textContent=score+'점';
  document.getElementById('res-frac').textContent=`${correctCnt}/${quiz.length}`;
  document.getElementById('res-c').textContent=correctCnt;
  document.getElementById('res-w').textContent=quiz.length-correctCnt-skipCnt;
  document.getElementById('res-s').textContent=skipCnt;
  document.getElementById('res-subj').textContent=currentSubject.key+' · '+(mode==='exam'?'실전모드':mode==='wrongnote'?'오답풀기':'일반모드');
  document.getElementById('res-msg').textContent=score>=90?'완벽해요! 🎉':score>=70?'잘 하셨어요!':score>=50?'조금 더 노력해봐요':'다시 도전해봐요 💪';
  document.getElementById('review-title').textContent=mode==='exam'?'채점 결과':'틀린 문제 복습';
  const wr=document.getElementById('wrong-review');
  if(wrongItems.length){
    wr.style.display='';
    document.getElementById('review-list').innerHTML=wrongItems.map(({q,myAns})=>{
      let ca=q.type==='mc'?(Array.isArray(q.answer)?q.answer.map(a=>NUMS[a]+' '+q.choices[a]).join(', '):`${NUMS[q.answer]} ${q.choices[q.answer]}`):q.answer;
      const exp=q.explanation?`<div class="r-exp">💡 ${q.explanation}</div>`:'';
      return `<div class="review-item">
        <div class="r-q">${q.question.substring(0,130)}${q.question.length>130?'...':''}</div>
        <div class="r-my">내 답: ${myAns}</div>
        <div class="r-ans">정답: ${ca}</div>${exp}
      </div>`;
    }).join('');
  }else wr.style.display='none';
  showScreen('screen-result'); allData={};
}

function renderWNList(){
  const wn=getWN(wnCurrentSubj);
  let items=Object.entries(wn).sort((a,b)=>b[1].wrongCount-a[1].wrongCount);

  document.getElementById('wn-detail-cnt').textContent=`${items.length}문제 · 틀린 횟수 순`;
  if(!items.length){document.getElementById('wn-detail-list').innerHTML='<div class="wn-empty">해당 조건의 오답이 없어요</div>';return;}
  document.getElementById('wn-detail-list').innerHTML=items.map(([key,{q,wrongCount,lastMyAns}])=>{
    let ca=q.type==='mc'?`${NUMS[q.answer]} ${q.choices[q.answer]}`:q.answer;

      ${exp}
    </div>`;
  }).join('');

function wnToggleTopic(btn){
  const val=btn.dataset.val;
  if(val==='all'){
    wnFilterTopic.clear();
    document.querySelectorAll('#wn-topic-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.val==='all'));
  } else {
    document.querySelector('#wn-topic-chips .chip[data-val="all"]').classList.remove('active');
    btn.classList.toggle('active');
    if(btn.classList.contains('active'))wnFilterTopic.add(val); else wnFilterTopic.delete(val);
    if(wnFilterTopic.size===0)document.querySelector('#wn-topic-chips .chip[data-val="all"]').classList.add('active');

  renderWNList();
}

function wnToggleSource(btn){

// ── 취약점 분석 ──
function renderStats(){
  const el=document.getElementById('stats-content');

  // 전체 오답 수집
  let totalAttempts=0, totalCorrect=0;
  const topicMap={};   // {topic: {correct,total}}
  const sourceMap={};  // {source: {correct,total}}
  const subjMap={};    // {subj: {correct,total}}

  SUBJECTS.forEach(s=>{
    const wn=getWN(s.key);
    const items=Object.values(wn);
    if(!items.length) return;
    if(!subjMap[s.key])subjMap[s.key]={correct:0,total:0,icon:s.icon};
    items.forEach(({q,wrongCount})=>{
      // 오답 횟수로 역산 (틀린 것만 기록되므로 total=wrongCount, correct=0으로 취급)
      const total=wrongCount;
      totalAttempts+=total; // 틀린 것만 있음
      // 주제
      const topic=q.topic||'(미분류)';
      if(!topicMap[topic])topicMap[topic]={wrong:0,subj:s.key};
      topicMap[topic].wrong+=wrongCount;
      // 출처
      const src=q.source||'미지정';
      if(!sourceMap[src])sourceMap[src]={wrong:0};
      sourceMap[src].wrong+=wrongCount;
      // 과목
      subjMap[s.key].total+=wrongCount;
    });
  });

  // 퀴즈 통계로 정답률 계산
  const subjStats={};
  SUBJECTS.forEach(s=>{
    const st=getStats(s.key);
    if(st.s!==null)subjStats[s.key]={score:st.s,attempts:st.a,icon:s.icon};
  });

  const hasData=Object.keys(subjStats).length>0||Object.keys(topicMap).length>0;
  if(!hasData){
    el.innerHTML='<div class="stats-empty">아직 데이터가 없어요<br>퀴즈를 풀면 분석 결과가 나타납니다</div>';
    return;
  }

  let html='';

  // 과목별 최근 점수
  const subjEntries=Object.entries(subjStats).sort((a,b)=>a[1].score-b[1].score);
  if(subjEntries.length){
    html+=`<div class="stats-section">
      <div class="stats-section-title">과목별 최근 점수</div>`;
    subjEntries.forEach(([key,{score,attempts,icon}])=>{
      const cls=score>=70?'good':score>=50?'mid':'bad';
      html+=`<div class="stat-row">
        <div class="stat-row-header">
          <span class="stat-row-label">${icon} ${key}</span>
          <span class="stat-row-val">${score}점 · ${attempts}회 응시</span>
        </div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill ${cls}" style="width:${score}%"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // 주제별 오답 횟수
  const topicEntries=Object.entries(topicMap).sort((a,b)=>b[1].wrong-a[1].wrong);
  if(topicEntries.length){
    const maxWrong=topicEntries[0][1].wrong;
    html+=`<div class="stats-section">
      <div class="stats-section-title">주제별 오답 횟수 (많은 순)</div>`;
    topicEntries.forEach(([topic,{wrong,subj}])=>{
      const pct=Math.round((wrong/maxWrong)*100);
      html+=`<div class="stat-row">
        <div class="stat-row-header">
          <span class="stat-row-label">${topic} <span style="font-size:11px;color:var(--text3);">${subj}</span></span>
          <span class="stat-row-val">✕ ${wrong}회</span>
        </div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill bad" style="width:${pct}%"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // 출처별 오답 횟수
  const srcEntries=Object.entries(sourceMap).sort((a,b)=>b[1].wrong-a[1].wrong);
  if(srcEntries.length){
    const maxW=srcEntries[0][1].wrong;
    html+=`<div class="stats-section">
      <div class="stats-section-title">출처별 오답 횟수</div>`;
    srcEntries.forEach(([src,{wrong}])=>{
      const pct=Math.round((wrong/maxW)*100);
      html+=`<div class="stat-row">
        <div class="stat-row-header">
          <span class="stat-row-label">${src}</span>
          <span class="stat-row-val">✕ ${wrong}회</span>
        </div>
        <div class="stat-bar-wrap"><div class="stat-bar-fill mid" style="width:${pct}%"></div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}


// ── 강의문제 잠금 ──
const manifest = ['CODE001', 'CODE002', 'CODE003'];
let lectureUnlocked = false;
try{ lectureUnlocked = localStorage.getItem('_lu')==='1'; }catch(e){}

function showUnlockModal(){
  document.getElementById('unlock-input').value='';
  document.getElementById('unlock-err').textContent='';
  document.getElementById('unlock-modal').style.display='flex';
  setTimeout(()=>document.getElementById('unlock-input').focus(),100);
}
function closeUnlockModal(){
  document.getElementById('unlock-modal').style.display='none';
}
function tryUnlock(){
  const val=document.getElementById('unlock-input').value.trim();
  if(manifest.includes(val)){
    lectureUnlocked=true;
    try{localStorage.setItem('_lu','1');}catch(e){}
    closeUnlockModal();
    // 현재 열린 필터 칩 갱신
    const topicChips=document.getElementById('source-chips');
    if(topicChips) refreshSourceChips();
    const wnChips=document.getElementById('wn-source-chips');
    if(wnChips) refreshWNSourceChips();
  } else {
    document.getElementById('unlock-err').textContent='코드가 올바르지 않아요';
  }
}
function refreshSourceChips(){
  const existing=document.querySelector('#source-chips .chip[data-val="강의문제"]');
  if(!existing && lectureUnlocked){
    const btn=document.createElement('button');
    btn.className='chip source-chip';
    btn.dataset.val='강의문제';
    btn.textContent='강의문제 🔓';
    btn.onclick=function(){toggleSource(this);};
    document.getElementById('source-chips').appendChild(btn);
  }
}
function refreshWNSourceChips(){
  const existing=document.querySelector('#wn-source-chips .chip[data-val="강의문제"]');
  if(!existing && lectureUnlocked){
    const btn=document.createElement('button');
    btn.className='chip source-chip';
    btn.dataset.val='강의문제';
    btn.textContent='강의문제 🔓';
    btn.onclick=function(){wnToggleSource(this);};
    document.getElementById('wn-source-chips').appendChild(btn);
  }
}
